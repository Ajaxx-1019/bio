<style>
  :root {
    /* vintage detective-office brown, night mode */
    --bg: #1a120b;
    --bg-soft: #241a10;
    --text: #f2e3c9;
    --text-dim: #b89a72;
    --accent: #e8a33d;      /* incandescent bulb yellow */
    --accent-2: #a85c32;    /* rust / worn leather */
    --accent-3: #6f4a2e;    /* dark wood */
    --border: rgba(242, 227, 201, 0.14);
    --vignette: rgba(0, 0, 0, 0.55);
    --radius-pill: 4px;
    --font-display: "Bodoni Moda", serif;
    --font-body: "Courier Prime", ui-monospace, monospace;
    --transition: 220ms ease;
  }

  [data-theme="light"] {
    /* aged paper / sepia photograph, day mode */
    --bg: #ede1c9;
    --bg-soft: #e2d3af;
    --text: #3a2a18;
    --text-dim: #7a5f3f;
    --accent: #b5651d;
    --accent-2: #8a4a2a;
    --accent-3: #cbb586;
    --border: rgba(58, 42, 24, 0.16);
    --vignette: rgba(58, 42, 24, 0.18);
  }

  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    background: var(--bg);
    overscroll-behavior: none;
  }
  body {
    overscroll-behavior: none;
  }
  * { box-sizing: border-box; }

  /* anti-copy: dampens casual copying (no blue selection box, no long-press
     save/callout menu, no right-click). This is NOT real DRM — view-source
     and devtools can still get around anything done purely in the browser —
     but it removes the easy, accidental ways people copy stuff. */
  *:not(input):not(textarea) {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea { -webkit-user-select: text; user-select: text; }
  ::selection { background: transparent; }
  ::-moz-selection { background: transparent; }
  img { -webkit-user-drag: none; user-drag: none; }

  html, body, #app { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    transition: background var(--transition), color var(--transition);
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  a { color: inherit; }

  /* Buttons feeling "not smooth" on touch is almost always this: the browser's
     default gray tap flash, :hover getting stuck after a tap instead of a real
     mouseover, and no immediate visual feedback on press. Fix all three. */
  button, .pill, a.pill, .icon-btn, .admin-fab, .add-btn, .type-option, .admin-option, .user-chip, .file-btn {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .pill:active, .icon-btn:active, .admin-fab:active, .add-btn:active, .type-option:active, .admin-option:active {
    transform: scale(0.95);
    transition: transform 80ms ease;
  }

  /* subtle paper grain + vignette — pure CSS, no image assets, cheap to render.
     Scoped to only appear while the vintage home page is showing (:has), so
     it doesn't wash out the plain white Create/Profile pages. */
  body:has(.page.home)::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(0, 0, 0, 0.5) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.06;
    pointer-events: none;
    z-index: 4;
  }
  body:has(.page.home)::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, transparent 40%, var(--vignette) 100%);
    pointer-events: none;
    z-index: 4;
    transition: background var(--transition);
  }

  .page { position: relative; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ---------- the hanging detective lamp: the one signature element ----------
     .lamp-anchor centers the whole rig horizontally at the ceiling.
     .lamp-rig is the part that rotates — transform-origin sits at its top,
     so it swings like it's actually hanging from that point. */
  .lamp-anchor {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    width: 0;
    height: 0;
  }
  .lamp-rig {
    position: relative;
    transform-origin: top center;
    transform: rotate(0deg);
    will-change: transform;
  }
  .lamp-hit {
    position: absolute;
    top: 30px;
    left: -30px;
    width: 60px;
    height: 66px;
    border-radius: 50%;
    cursor: grab;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    z-index: 4;
  }
  .lamp-hit.dragging { cursor: grabbing; }
  .lamp-cord {
    position: absolute;
    top: 0;
    left: 0;
    transform: translateX(-50%);
    width: 2px;
    height: 64px;
    background: linear-gradient(to bottom, transparent, var(--text-dim));
    opacity: 0.6;
  }
  .lamp-bulb {
    position: absolute;
    top: 60px;
    left: 0;
    transform: translateX(-50%);
    width: 12px;
    height: 16px;
    border-radius: 50% 50% 45% 45%;
    background: var(--accent);
    box-shadow: 0 0 24px 8px var(--accent);
    transition: opacity 50ms linear, box-shadow 50ms linear;
  }
  .lamp-glow {
    position: absolute;
    top: 68px;
    left: 0;
    transform: translate(-50%, -50%);
    width: 480px;
    height: 480px;
    max-width: 150vw;
    max-height: 150vw;
    border-radius: 50%;
    background: radial-gradient(circle at center, var(--accent) 0%, transparent 68%);
    opacity: 0.3;
    pointer-events: none;
    transition: opacity 50ms linear;
  }
  body.flicker .lamp-bulb { opacity: 0.12; box-shadow: none; }
  body.flicker .lamp-glow { opacity: 0.04; }

  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 24px 32px; position: relative; z-index: 2; }
  .wordmark { font-family: var(--font-display); font-weight: 600; font-size: 20px; letter-spacing: 0.3px; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid var(--border); background: var(--bg-soft); color: var(--text);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform var(--transition), background var(--transition);
  }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (hover: hover) and (pointer: fine) {
    .icon-btn:hover { transform: translateY(-2px); }
    .pill-solid:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px var(--accent); }
    .admin-fab:hover { transform: translateY(-2px); }
  }

  .pill {
    font-family: var(--font-body); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 11px 22px; border-radius: var(--radius-pill); text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; border: 1px solid transparent;
    cursor: pointer; transition: transform var(--transition), background var(--transition), box-shadow var(--transition), color var(--transition);
  }
  .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .pill-ghost { color: var(--text-dim); border-color: var(--border); background: transparent; }
  .pill-ghost:hover { color: var(--text); border-color: var(--accent); }

  .pill-solid { background: var(--accent); color: #1a120b; box-shadow: 0 8px 20px -8px var(--accent); }

  .pill-outline { border-color: var(--accent-2); color: var(--text); background: transparent; }
  .pill-outline:hover { background: var(--accent-2); color: var(--text); border-color: var(--accent-2); }

  .hero {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px 20px 90px; position: relative; z-index: 2;
  }
  .eyebrow { font-family: var(--font-body); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 18px; }
  .title { font-family: var(--font-display); font-weight: 600; font-size: clamp(52px, 11vw, 104px); margin: 0; line-height: 1; animation: pop-in 500ms cubic-bezier(0.2, 0.9, 0.3, 1.3); }
  .subtitle { max-width: 440px; color: var(--text-dim); font-size: 15px; line-height: 1.7; margin: 22px 0 38px; }
  .cta-row {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    animation: fade-up-in 460ms ease both; animation-delay: 120ms;
  }

  @keyframes pop-in { from { opacity: 0; transform: translateY(16px) scale(0.96); } to { opacity: 1; transform: none; } }
  @keyframes fade-up-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .footer {
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap; row-gap: 4px;
    gap: 8px; padding: 14px 20px 16px; font-size: 12px; color: var(--text-dim);
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 6;
    background: linear-gradient(to top, var(--bg) 55%, transparent);
  }
  .visitor-eye { display: inline-block; animation: blink-eye 5s ease-in-out infinite; }
  @keyframes blink-eye {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  .footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
  .footer a:hover { text-decoration: underline; }
  .dot { opacity: 0.5; }

  .user-chip { position: relative; display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 10px 6px 6px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--bg-soft); }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); display: block; }
  .user-name { font-size: 12px; color: var(--text-dim); max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-chip-caret { font-size: 10px; color: var(--text-dim); transition: transform var(--transition); }
  .user-chip.open .user-chip-caret { transform: rotate(180deg); }
  .user-menu {
    position: absolute; top: calc(100% + 8px); right: 0; min-width: 140px;
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px;
    padding: 6px; box-shadow: 0 12px 28px -12px rgba(0,0,0,0.5);
    opacity: 0; transform: translateY(-6px); pointer-events: none; transition: opacity var(--transition), transform var(--transition);
    z-index: 5;
  }
  .user-chip.open .user-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .user-menu-item {
    display: block; width: 100%; text-align: left; padding: 9px 10px; border-radius: 8px;
    border: none; background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 13px; cursor: pointer;
  }
  .user-menu-item:hover { background: rgba(245,241,255,0.08); }

  .admin-fab {
    position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg-soft); color: var(--text); font-size: 20px;
    cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition);
  }
  .admin-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 30;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .admin-sheet {
    background: var(--bg-soft); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
    padding: 16px 18px 24px; font-family: var(--font-body); border-top: 1px solid var(--border);
  }
  .admin-sheet-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: var(--accent); font-weight: 700;
  }
  .admin-sheet h3 { font-family: var(--font-display); margin: 0 0 12px; font-size: 20px; }
  .admin-option {
    display: block; width: 100%; text-align: left; padding: 14px 12px; margin-bottom: 8px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit;
    font-size: 14px; cursor: pointer;
  }
  .admin-option:hover { border-color: var(--accent); }
  .admin-option:disabled { opacity: 0.45; cursor: default; }
  .admin-soon { float: right; font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
  .admin-note { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  @media (prefers-reduced-motion: reduce) { .title { animation: none; } }

  .stub { align-items: center; justify-content: center; text-align: center; gap: 8px; }
  .stub-back { position: absolute; top: 24px; left: 32px; }
  .stub h2 { font-family: var(--font-display); font-size: 32px; margin: 0; }

  /* ---------- Create / Profile: deliberately different from the home page —
     plain white, a distinct clean sans, no lamp/vintage theme here ---------- */
  .page.create {
    background: #ffffff;
    color: #14141a;
    font-family: "Plus Jakarta Sans", sans-serif;
    min-height: 100vh;
  }
  .page.create .create-topbar { border-bottom: 1px solid #ececef; padding: 12px 16px; }
  .page.create .create-topbar .icon-btn {
    background: #f3f3f5; border-color: #ececef; color: #14141a; text-decoration: none; font-size: 15px;
    width: 34px; height: 34px;
  }
  .page.create .create-title {
    font-weight: 700; font-size: 14px; flex: 1; min-width: 0; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px;
  }
  .page.create .pill-solid { background: #a85c32; color: #fff; box-shadow: none; }
  .page.create .pill-solid:hover { background: #8a4a2a; transform: none; box-shadow: none; }

  .create-body { padding: 18px 16px 90px; max-width: 560px; margin: 0 auto; width: 100%; }

  .field-group { margin-bottom: 16px; }
  .field-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #45454f; }
  .field-group input[type="text"], .field-group textarea {
    width: 100%; border: 1px solid #e2e2e7; border-radius: 10px; padding: 10px 12px;
    font-family: inherit; font-size: 13px; color: #14141a; background: #fafafb;
    transition: border-color 160ms ease;
  }
  .field-group input[type="text"]:focus, .field-group textarea:focus { outline: none; border-color: #a85c32; background: #fff; }
  .field-group textarea { min-height: 70px; resize: vertical; }
  .username-field { display: flex; align-items: center; border: 1px solid #e2e2e7; border-radius: 10px; background: #fafafb; padding: 0 12px; }
  .username-field .at-sign { color: #9a9aa5; font-weight: 700; font-size: 13px; }
  .username-field input { border: none; background: transparent; padding: 10px 4px; flex: 1; font-size: 13px; }
  .username-field input:focus { outline: none; }
  .field-hint { font-size: 11px; color: #9a9aa5; margin: 5px 2px 0; }
  .field-hint-error { color: #d1435b; }

  .section-divider {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: #9a9aa5;
  }
  .add-btn {
    width: 24px; height: 24px; border-radius: 50%; border: none; background: #a85c32; color: #fff;
    font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .section-move-controls { display: flex; gap: 4px; }
  .section-move-controls .icon-btn.small { width: 22px; height: 22px; font-size: 10px; }
  .empty-hint { color: #9a9aa5; font-size: 13px; text-align: center; padding: 24px 0; }
  .search-results-fade { animation: fade-up-in 280ms ease both; }
  .search-again-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; margin-top: 6px; }

  .item-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px; border: 1px solid #ececef; border-radius: 12px; margin-bottom: 8px; background: #fff; }
  .item-row.pop-in { animation: item-pop-in 260ms cubic-bezier(0.2, 0.9, 0.3, 1.3); }
  @keyframes item-pop-in { from { opacity: 0; transform: scale(0.92) translateY(6px); } to { opacity: 1; transform: none; } }
  .item-icon-btn { width: 38px; height: 38px; border-radius: 10px; background: #f3f3f5; border: 1px dashed #d8d8de; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; flex-shrink: 0; }
  .item-icon-preview { width: 100%; height: 100%; object-fit: cover; }
  .item-icon-placeholder { color: #9a9aa5; font-size: 18px; }
  .item-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .item-fields input[type="text"] { border: 1px solid #ececef; border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: inherit; background: #fafafb; }
  .item-fields input[type="text"]:focus { outline: none; border-color: #a85c32; background: #fff; }
  .item-extra { display: flex; flex-direction: column; gap: 6px; }
  .file-btn { font-size: 12px; color: #a85c32; font-weight: 700; cursor: pointer; align-self: flex-start; }
  .item-audio { width: 100%; height: 32px; }
  .item-controls { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .icon-btn.small { width: 28px; height: 28px; font-size: 13px; background: #f3f3f5; border-color: #ececef; color: #45454f; }
  .icon-btn.small:disabled { opacity: 0.3; cursor: default; }
  .icon-btn.small.danger { color: #d1435b; }

  .type-picker {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 200ms ease;
    padding: 20px;
  }
  .type-picker.open { opacity: 1; pointer-events: auto; }
  .type-picker-sheet {
    background: #fff; border-radius: 18px; width: 100%; max-width: 380px;
    padding: 8px 12px 16px; max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    transform: scale(0.94); transition: transform 200ms ease;
  }
  .type-picker.open .type-picker-sheet { transform: scale(1); }
  .type-picker-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 8px; font-weight: 700; }
  .type-option { display: block; width: 100%; text-align: left; padding: 14px 12px; border: none; background: none; font-family: inherit; font-size: 14px; color: #14141a; border-radius: 12px; cursor: pointer; }
  .type-option:hover { background: #f3f3f5; }

  .platform-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px 8px 4px; }
  .platform-option {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    border: none; background: none; cursor: pointer; font-family: inherit;
    padding: 10px 4px; border-radius: 12px;
  }
  .platform-option:hover { background: #f3f3f5; }
  .platform-circle {
    width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; color: #fff; font-weight: 700; font-size: 13px;
  }
  .platform-label { font-size: 11px; color: #45454f; }
  .preset-icon {
    display: flex; align-items: center; justify-content: center; color: #fff;
    font-weight: 700; font-size: 11px;
  }

  .cover-upload {
    display: flex; align-items: center; justify-content: center; height: 84px; border-radius: 12px;
    background: #f3f3f5 center/cover no-repeat; border: 1px dashed #d8d8de; cursor: pointer;
    color: #9a9aa5; font-size: 12px; font-weight: 600; overflow: hidden;
  }
  .cover-upload.uploading { opacity: 0.5; }
  .avatar-upload {
    width: 52px; height: 52px; border-radius: 50%; background: #f3f3f5; border: 1px dashed #d8d8de;
    display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; font-size: 20px;
  }
  .avatar-upload.uploading { opacity: 0.5; }
  .avatar-upload img, .cover-upload img { width: 100%; height: 100%; object-fit: cover; }

  .admin-account-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 4px; border-bottom: 1px solid var(--border);
  }
  .admin-account-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; text-decoration: none; color: inherit; cursor: pointer; }
  .admin-account-info:hover .admin-account-name { text-decoration: underline; }
  .admin-account-name { font-size: 13px; font-weight: 700; }
  .admin-account-meta { font-size: 11px; color: var(--text-dim); }

<body>
<div id="fullscreen-gate" class="fullscreen-gate">
  <div class="fullscreen-gate-inner">
    <span class="gate-word">mybio</span>
    <button type="button" class="pill pill-solid" id="enter-fullscreen-btn">Enter Fullscreen</button>
  </div>
</div>
<div id="app"></div>

<script>
(function () {
  "use strict";

  // ---------- anti-copy ----------
  // Blocks the easy paths (right-click menu, Ctrl+C, image drag-out).
  // Doesn't stop devtools/view-source — nothing client-side can.
  document.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  document.addEventListener("copy", function (e) { e.preventDefault(); });
  document.addEventListener("cut", function (e) { e.preventDefault(); });
  document.addEventListener("dragstart", function (e) { e.preventDefault(); });

  // ---------- fullscreen entry gate ----------
  // Browsers require a real user gesture before granting fullscreen and
  // won't let a page hide its own address bar without one — this gate button
  // is that gesture, shown once before the site itself appears. iOS Safari
  // doesn't support the Fullscreen API for regular pages at all (Apple's
  // limitation, not fixable from here) — "Add to Home Screen" (manifest
  // already in <head>) is the reliable route there.
  (function () {
    var gate = document.getElementById("fullscreen-gate");
    if (!gate) return;
    if (sessionStorage.getItem("mybio-fs-dismissed") === "1") {
      gate.classList.add("hidden");
      return;
    }
    var btn = document.getElementById("enter-fullscreen-btn");
    if (btn) {
      btn.addEventListener("click", function () {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(function () {});
        }
        sessionStorage.setItem("mybio-fs-dismissed", "1");
        gate.classList.add("hidden");
      });
    }
  })();

  var SUN_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/></svg>';
  var MOON_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z"/></svg>';
  var PALETTE_ICON = '<svg width="16" height="16" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="28" stroke-linecap="round"><path d="M256 16C123 16 16 111 16 235c0 65 44 90 74 90h29c25 0 37 18 37 37 0 12-5 22-13 31-10 11-13 21-13 33 0 45 60 66 126 66 133 0 240-105 240-227S389 16 256 16Z" stroke-linejoin="round"/><circle cx="140" cy="200" r="28"/><circle cx="230" cy="128" r="28"/><circle cx="336" cy="172" r="28"/><circle cx="110" cy="328" r="28"/><path d="M300 356l148-148" stroke-width="34"/></svg>';
  var LINK_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
  var SEARCH_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>';
  var EDIT_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H6a3 3 0 0 0-3 3v11a3 3 0 0 0 3 3h11a3 3 0 0 0 3-3v-3"/><path d="M17.5 3.5a2.1 2.1 0 0 1 3 3L11 16l-4 1 1-4 9.5-9.5z"/></svg>';

  // ---------- theme ----------
  function getTheme() {
    return localStorage.getItem("mybio-theme") || "dark";
  }
  function setTheme(theme) {
    localStorage.setItem("mybio-theme", theme);
    document.documentElement.setAttribute("data-theme", theme);
  }
  function toggleTheme() {
    setTheme(getTheme() === "dark" ? "light" : "dark");
    render();
  }
  document.documentElement.setAttribute("data-theme", getTheme());

  // ---------- tiny router (no library needed) ----------
  // Fades the current page out, swaps content, fades the new one in — so
  // switching pages doesn't feel like a hard instant jump-cut.
  function withPageTransition(applyFn) {
    var app = document.getElementById("app");
    if (!app) { applyFn(); return; }
    app.style.transition = "opacity 140ms ease, transform 140ms ease";
    app.style.opacity = "0";
    app.style.transform = "translateY(6px)";
    setTimeout(function () {
      applyFn();
      var app2 = document.getElementById("app");
      if (!app2) return;
      app2.style.transition = "none";
      app2.style.opacity = "0";
      app2.style.transform = "translateY(10px)";
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          app2.style.transition = "opacity 220ms ease, transform 220ms ease";
          app2.style.opacity = "1";
          app2.style.transform = "translateY(0)";
          // translateY(0) is still a set "transform" as far as CSS is concerned,
          // which makes any position:fixed popup inside #app anchor to this
          // div instead of the real viewport — clear it out once the
          // animation is done so fixed modals behave correctly again.
          setTimeout(function () {
            app2.style.transition = "";
            app2.style.transform = "";
            app2.style.opacity = "";
          }, 230);
        });
      });
    }, 140);
  }

  function navigate(path) {
    history.pushState({}, "", path);
    withPageTransition(render);
  }
  window.addEventListener("popstate", function () { withPageTransition(render); });

  // ---------- flickering detective lamp ----------
  // Faulty-bulb feel: irregular random dips instead of a clean repeating loop.
  var audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  // Browsers block audio until the user interacts with the page at least once —
  // this just arms the audio context on the first tap/click anywhere.
  document.addEventListener("click", initAudio, { once: true });

  function playClick() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(1400, t);
    gain.gain.setValueAtTime(0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.035);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.04);
  }

  // Filtered noise burst — no audio file needed, just approximates a quick
  // paper-crumple/toss-in-the-bin sound for the trash button.
  function playTrashSound() {
    if (!audioCtx) return;
    var duration = 0.28;
    var bufferSize = Math.floor(audioCtx.sampleRate * duration);
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.6);
    }
    var noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    var filter = audioCtx.createBiquadFilter();
    filter.type = "bandpass";
    filter.frequency.value = 2400;
    filter.Q.value = 0.6;
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start();
  }

  function isHomeRoute() {
    return window.location.pathname === "/";
  }

  function scheduleFlicker() {
    setTimeout(function () {
      if (isHomeRoute()) {
        document.body.classList.add("flicker");
        playClick();
        var dipMs = 50 + Math.random() * 140;
        setTimeout(function () {
          if (isHomeRoute()) {
            document.body.classList.remove("flicker");
            playClick();
          }
          // occasionally double-flicker, like a bad connection
          if (Math.random() < 0.3) {
            setTimeout(function () {
              if (isHomeRoute()) {
                document.body.classList.add("flicker");
                playClick();
              }
              setTimeout(function () {
                if (isHomeRoute()) {
                  document.body.classList.remove("flicker");
                  playClick();
                }
              }, 40 + Math.random() * 80);
            }, 90);
          }
        }, dipMs);
      }
      scheduleFlicker();
    }, 1500 + Math.random() * 4500);
  }

  // ---------- lamp: drag it, it swings back like a real pull-cord ----------
  // Pointer Events (not touch/mouse events separately) so this works the
  // same on phones, desktop mode, mouse, and stylus with one code path.
  var lampAngle = 0;
  var lampVelocity = 0;
  var lampDragging = false;
  var lampDragStartX = 0;
  var lampDragStartAngle = 0;
  var lampLastX = 0;
  var lampLastTime = 0;
  var lampAnimFrame = null;
  var LAMP_MAX_ANGLE = 55;
  var LAMP_SPRING_K = 0.02;
  var LAMP_DAMPING = 0.94;

  function applyLampAngle() {
    var rig = document.getElementById("lamp-rig");
    if (rig) rig.style.transform = "rotate(" + lampAngle.toFixed(2) + "deg)";
  }

  function cancelLampAnimation() {
    if (lampAnimFrame) {
      cancelAnimationFrame(lampAnimFrame);
      lampAnimFrame = null;
    }
  }

  function startLampSwing() {
    cancelLampAnimation();
    function step() {
      var accel = -LAMP_SPRING_K * lampAngle;
      lampVelocity += accel;
      lampVelocity *= LAMP_DAMPING;
      lampAngle += lampVelocity;
      applyLampAngle();

      if (Math.abs(lampAngle) > 0.05 || Math.abs(lampVelocity) > 0.05) {
        lampAnimFrame = requestAnimationFrame(step);
      } else {
        lampAngle = 0;
        lampVelocity = 0;
        applyLampAngle();
        lampAnimFrame = null;
      }
    }
    lampAnimFrame = requestAnimationFrame(step);
  }

  function attachLampEvents() {
    var hit = document.getElementById("lamp-hit");
    if (!hit) return;

    cancelLampAnimation();
    lampAngle = 0;
    lampVelocity = 0;
    applyLampAngle();

    hit.addEventListener("pointerdown", function (e) {
      lampDragging = true;
      cancelLampAnimation();
      hit.classList.add("dragging");
      lampDragStartX = e.clientX;
      lampDragStartAngle = lampAngle;
      lampLastX = e.clientX;
      lampLastTime = performance.now();
      lampVelocity = 0;
      try { hit.setPointerCapture(e.pointerId); } catch (err) {}
    });

    hit.addEventListener("pointermove", function (e) {
      if (!lampDragging) return;
      var dx = e.clientX - lampDragStartX;
      var newAngle = lampDragStartAngle + dx * 0.35;
      newAngle = Math.max(-LAMP_MAX_ANGLE, Math.min(LAMP_MAX_ANGLE, newAngle));

      var now = performance.now();
      var dt = now - lampLastTime || 16.67;
      lampVelocity = (newAngle - lampAngle) / (dt / 16.67);
      lampLastTime = now;
      lampLastX = e.clientX;

      lampAngle = newAngle;
      applyLampAngle();
    });

    function endLampDrag(e) {
      if (!lampDragging) return;
      lampDragging = false;
      hit.classList.remove("dragging");
      try { hit.releasePointerCapture(e.pointerId); } catch (err) {}
      startLampSwing();
    }

    hit.addEventListener("pointerup", endLampDrag);
    hit.addEventListener("pointercancel", endLampDrag);
  }

  // ---------- Firebase (Auth + Firestore) ----------
  var firebaseConfig = {
    apiKey: "AIzaSyDgWfFPZ4Daah8jhnu0ZbQTbv5V_KZDM1Y",
    authDomain: "ajaxxbio-zoneid.firebaseapp.com",
    projectId: "ajaxxbio-zoneid",
    storageBucket: "ajaxxbio-zoneid.firebasestorage.app",
    messagingSenderId: "336840258366",
    appId: "1:336840258366:web:4ee745d77aeb357eaef26f",
    measurementId: "G-PF2XV8MHFB"
  };

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();

  // ---------- Cloudinary (unsigned upload) ----------
  // The "AjaxxBio" preset must have Signing Mode set to "Unsigned" in the
  // Cloudinary console (Settings -> Upload -> Upload presets), or every
  // upload here will fail with a 401 — there's no backend here to sign requests.
  var CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/l4oxgqqj/auto/upload";
  var CLOUDINARY_UPLOAD_PRESET = "AjaxxBio";

  function uploadToCloudinary(file, cb) {
    var formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    fetch(CLOUDINARY_URL, { method: "POST", body: formData })
      .then(function (res) { return res.json(); })
      .then(function (data) { cb(data.secure_url || null, data); })
      .catch(function (err) { cb(null, err); });
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str == null ? "" : str;
    return div.innerHTML;
  }

  // { uid, name, email, picture } — set by Firebase itself, never hand-decoded
  var currentUser = null;
  var myBioUsername = null; // just the username, for the home page "My Bio!" shortcut

  var visitorCount = null;

  function bumpVisitorCount() {
    var ref = db.collection("meta").doc("visitorCount");

    // Already counted this browser before — just read the current total,
    // don't increment again on every reload.
    if (localStorage.getItem("mybio-visitor-counted") === "1") {
      ref.get().then(function (doc) {
        visitorCount = doc.exists ? (doc.data().count || 3) : 3;
        var el = document.getElementById("visitor-count");
        if (el) el.textContent = visitorCount;
      }).catch(function (err) { console.error("visitor count read failed:", err); });
      return;
    }

    db.runTransaction(function (tx) {
      return tx.get(ref).then(function (doc) {
        var next = doc.exists ? (doc.data().count || 0) + 1 : 3; // first-ever visitor starts the count at 3
        tx.set(ref, { count: next });
        return next;
      });
    }).then(function (next) {
      visitorCount = next;
      localStorage.setItem("mybio-visitor-counted", "1");
      var el = document.getElementById("visitor-count");
      if (el) el.textContent = next;
    }).catch(function (err) {
      console.error("visitor count failed:", err);
    });
  }

  function refreshMyBioUsername() {
    if (!currentUser) { myBioUsername = null; return; }
    db.collection("users").doc(currentUser.uid).get().then(function (doc) {
      myBioUsername = doc.exists ? doc.data().username : null;

  // ---------- bio draft ----------
  // Lives in memory + Firestore now — one document per username in the
  // "bios" collection, plus a "users/{uid} -> username" doc so we can find

  var USERNAME_REGEX = /^[a-zA-Z0-9_.-]{4,}$/;
  var CONTENT_TYPES = [
    { key: "social", label: "Social Media" },
    { key: "link", label: "Link" },

  function loadMyDraft(cb) {
    if (!currentUser) { draftLoaded = true; cb(); return; }
    db.collection("users").doc(currentUser.uid).get().then(function (userDoc) {
      if (!userDoc.exists || !userDoc.data().username) { draftLoaded = true; cb(); return; }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  var lastAddedItemId = null;

  // Real live follower counts / auto profile-picture fetching from Instagram,
  // TikTok, X, etc. isn't something this can do without paid third-party APIs
  // or official developer access from each platform — so these are presets
  // (icon + name) the person fills in themselves, same as any Linktree-style tool.
  var SOCIAL_PLATFORMS = {
    instagram: { name: "Instagram", color: "#E1306C", glyph: "IG", urlBase: "https://instagram.com/" },
    x: { name: "X", color: "#000000", glyph: "X", urlBase: "https://x.com/" },
    tiktok: { name: "TikTok", color: "#010101", glyph: "TT", urlBase: "https://tiktok.com/@" },
    facebook: { name: "Facebook", color: "#1877F2", glyph: "f", urlBase: "https://facebook.com/" },
    threads: { name: "Threads", color: "#000000", glyph: "@", urlBase: "https://threads.net/@" },
    spotify: { name: "Spotify", color: "#1DB954", glyph: "♫", urlBase: null } // Spotify keeps a full pasted link
  };

  // Instagram/X/TikTok/Facebook/Threads items just need a handle (e.g. "edd_00z")
  // — this builds the real profile link from platform + handle. Spotify still
  // uses whatever full URL was pasted in, since profile/playlist links vary.
  function resolveSocialHref(item) {
    if (item.type !== "social" || !item.icon || item.icon.indexOf("preset:") !== 0) {
      return item.url || "#";
    }
    var platform = SOCIAL_PLATFORMS[item.icon.slice(7)];
    if (!platform || !platform.urlBase) return item.url || "#";
    var handle = (item.url || "").trim().replace(/^@/, "").replace(/^https?:\/\/\S+\//, "");
    if (!handle) return "#";
    return platform.urlBase + encodeURIComponent(handle);
  }

  function addItem(type) {
    var item = { id: genId(), type: type, icon: null, label: "", url: "" };
    draft.items.push(item);
    lastAddedItemId = item.id;
    renderItemsList();
  }

  function addSocialItem(platformKey) {
    var p = SOCIAL_PLATFORMS[platformKey];
    if (!p) return;
    var item = { id: genId(), type: "social", icon: "preset:" + platformKey, label: p.name, url: "" };
    draft.items.push(item);
    lastAddedItemId = item.id;
    renderItemsList();
  }

  // Shared by the create-page item rows and the public profile display, so
  // preset platform icons look the same as uploaded ones everywhere.
  function renderIconHtml(item, sizeClass) {
    if (item.icon && item.icon.indexOf("preset:") === 0) {
      var p = SOCIAL_PLATFORMS[item.icon.slice(7)];
      if (p) {
        return '<div class="' + sizeClass + ' preset-icon" style="background:' + p.color + '">' + p.glyph + '</div>';
      }
    }
    if (item.icon === "uploading") return '<span class="item-icon-placeholder">…</span>';
    if (item.icon) return '<img src="' + item.icon + '" class="' + sizeClass + '" alt="" />';
    return '<span class="item-icon-placeholder">＋</span>';
  }

  function removeItem(id) {
    draft.items = draft.items.filter(function (it) { return it.id !== id; });
    renderItemsList();
  }

  function updateItemField(id, field, value) {
    var item = draft.items.find(function (it) { return it.id === id; });
    if (!item) return;
    item[field] = value;
  }

  function moveItem(id, dir) {
    var item = draft.items.find(function (it) { return it.id === id; });
    if (!item) return;
    var sameType = draft.items.filter(function (it) { return it.type === item.type; });
    var idx = sameType.findIndex(function (it) { return it.id === id; });
    var swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= sameType.length) return;
    var other = sameType[swapIdx];
    var realA = draft.items.findIndex(function (it) { return it.id === item.id; });
    var realB = draft.items.findIndex(function (it) { return it.id === other.id; });
    var tmp = draft.items[realA];
    draft.items[realA] = draft.items[realB];
    draft.items[realB] = tmp;
    renderItemsList();
  }

  function moveToTop(id) {
    var idx = draft.items.findIndex(function (it) { return it.id === id; });
    if (idx === -1) return;
    var item = draft.items[idx];
    draft.items.splice(idx, 1);
    var firstSameType = draft.items.findIndex(function (it) { return it.type === item.type; });
    if (firstSameType === -1) firstSameType = draft.items.length;
    draft.items.splice(firstSameType, 0, item);
    renderItemsList();
  }

  function moveSection(key, dir) {
    if (!draft.sectionOrder || !draft.sectionOrder.length) {
      draft.sectionOrder = CONTENT_TYPES.map(function (t) { return t.key; });
    }
    var visibleKeys = draft.sectionOrder.filter(function (k) {
      return draft.items.some(function (it) { return it.type === k; });
    });
    var idx = visibleKeys.indexOf(key);
    var swapIdx = idx + dir;
    if (idx === -1 || swapIdx < 0 || swapIdx >= visibleKeys.length) return;
    var other = visibleKeys[swapIdx];
    var realA = draft.sectionOrder.indexOf(key);
    var realB = draft.sectionOrder.indexOf(other);
    var tmp = draft.sectionOrder[realA];
    draft.sectionOrder[realA] = draft.sectionOrder[realB];
    draft.sectionOrder[realB] = tmp;
    renderItemsList();
  }

    item.url = "uploading";

  // ---------- photo crop modal (shared by cover / avatar / item icons) ----------
  var cropper = null;
  var cropCallback = null;

  function openCropModal(file, aspectRatio, cb) {
    var modal = document.getElementById("crop-modal");
    var img = document.getElementById("crop-image");
    if (!modal || !img || !window.Cropper) { cb(file); return; } // fallback: use the raw file
    var reader = new FileReader();
    reader.onload = function () {
      img.onload = function () {
        if (cropper) { cropper.destroy(); cropper = null; }
        cropper = new Cropper(img, { aspectRatio: aspectRatio, viewMode: 1, background: false, autoCropArea: 1 });
      };
      img.src = reader.result;
      modal.classList.add("open");
    };
    reader.readAsDataURL(file);
    cropCallback = cb;
  }

  function closeCropModal() {
    var modal = document.getElementById("crop-modal");
    if (modal) modal.classList.remove("open");
    if (cropper) { cropper.destroy(); cropper = null; }
    cropCallback = null;
  }

  function attachCropModalEvents() {
    var cancelBtn = document.getElementById("crop-cancel");
    var confirmBtn = document.getElementById("crop-confirm");
    if (cancelBtn) cancelBtn.addEventListener("click", closeCropModal);
    if (confirmBtn) {
      confirmBtn.addEventListener("click", function () {
        if (!cropper || !cropCallback) return;
        var cb = cropCallback;
        cropper.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }).toBlob(function (blob) {
          closeCropModal();
          cb(blob);
        }, "image/jpeg", 0.9);
      });
    }
  }

  function resetPublishBtn() {
    var btn = document.getElementById("publish-btn");

  function publishBio() {
    if (!currentUser || !validateUsername()) return;
    var btn = document.getElementById("publish-btn");
    if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }

    var newUsername = draft.username;
    var bioRef = db.collection("bios").doc(newUsername);

    bioRef.get().then(function (existing) {
      if (existing.exists && existing.data().uid !== currentUser.uid) {
        var hint = document.getElementById("username-hint");
        if (hint) { hint.textContent = "That username is already taken."; hint.classList.add("field-hint-error"); }
        resetPublishBtn();
        return;
      }

      var payload = {
        uid: currentUser.uid,
        username: newUsername,
        displayName: draft.displayName || "",
        bio: draft.bio || "",
        avatar: draft.avatar || null,
        cover: draft.cover || null,
        items: draft.items || [],
        banned: existing.exists ? !!existing.data().banned : false,
        color: existing.exists ? (existing.data().color || null) : null,
        sectionOrder: draft.sectionOrder && draft.sectionOrder.length ? draft.sectionOrder : CONTENT_TYPES.map(function (t) { return t.key; }),
        createdAt: existing.exists ? existing.data().createdAt : firebase.firestore.FieldValue.serverTimestamp()
      };

      var batch = db.batch();
      batch.set(bioRef, payload, { merge: true });
      if (draftDocId && draftDocId !== newUsername) {
        batch.delete(db.collection("bios").doc(draftDocId));
      }
      batch.set(db.collection("users").doc(currentUser.uid), { username: newUsername });

      batch.commit().then(function () {
        draftDocId = newUsername;
        navigate("/@" + newUsername);
      }).catch(function (err) {
        console.error(err);
        alert("Save failed: " + (err && err.message ? err.message : err) + (err && err.code ? " (" + err.code + ")" : ""));
        var hint2 = document.getElementById("username-hint");
        if (hint2) { hint2.textContent = "Something went wrong saving — try again."; hint2.classList.add("field-hint-error"); }
        resetPublishBtn();
      });
    }).catch(function (err) {
      console.error(err);
      alert("Save failed: " + (err && err.message ? err.message : err) + (err && err.code ? " (" + err.code + ")" : ""));
      resetPublishBtn();
    });
  }

  function renderItemsList() {
    var container = document.getElementById("items-list");
    if (!container) return;

    // FLIP animation: remember where each row currently sits before the
    // DOM gets rebuilt, so we can smoothly animate it into its new spot
    // instead of it just jumping there instantly.
    var firstRects = {};
    Array.prototype.forEach.call(container.querySelectorAll("[data-item-id]"), function (el) {
      firstRects[el.getAttribute("data-item-id")] = el.getBoundingClientRect();
    });
    Array.prototype.forEach.call(container.querySelectorAll("[data-section-key]"), function (el) {
      firstRects["section:" + el.getAttribute("data-section-key")] = el.getBoundingClientRect();
    });

    var order = (draft.sectionOrder && draft.sectionOrder.length) ? draft.sectionOrder : CONTENT_TYPES.map(function (t) { return t.key; });
    var visibleKeys = order.filter(function (key) {
      return draft.items.some(function (it) { return it.type === key; });
    });

    var html = "";
    order.forEach(function (key) {
      var typeDef = CONTENT_TYPES.find(function (t) { return t.key === key; });
      if (!typeDef) return;
      var itemsOfType = draft.items.filter(function (it) { return it.type === key; });
      if (!itemsOfType.length) return;
      var vIdx = visibleKeys.indexOf(key);
      html +=
        '<div class="section-divider" data-section-key="' + key + '">' +
          '<span>' + typeDef.label + '</span>' +
          '<span class="section-move-controls">' +
            '<button type="button" class="icon-btn small" data-move-section="' + key + ':-1"' + (vIdx === 0 ? " disabled" : "") + ' aria-label="Move section up">▲</button>' +
            '<button type="button" class="icon-btn small" data-move-section="' + key + ':1"' + (vIdx === visibleKeys.length - 1 ? " disabled" : "") + ' aria-label="Move section down">▼</button>' +
          '</span>' +
        '</div>';
      itemsOfType.forEach(function (item, idx) {
        html += itemRowHtml(item, idx, itemsOfType.length);
      });
    });
    container.innerHTML = html || '<p class="empty-hint">Nothing yet — tap + to add a social, link, song, and more.</p>';

    Array.prototype.forEach.call(container.querySelectorAll("[data-item-id], [data-section-key]"), function (el) {
      var id = el.hasAttribute("data-item-id") ? el.getAttribute("data-item-id") : "section:" + el.getAttribute("data-section-key");
      var first = firstRects[id];
      if (first) {
        var last = el.getBoundingClientRect();
        var deltaY = first.top - last.top;
        if (Math.abs(deltaY) > 1) {
          el.style.transition = "none";
          el.style.transform = "translateY(" + deltaY + "px)";
          requestAnimationFrame(function () {
            el.style.transition = "transform 220ms ease";
            el.style.transform = "translateY(0)";
          });
        }
      } else if (id === lastAddedItemId) {
        el.classList.add("pop-in");
      }
    });
    lastAddedItemId = null;
  }

  function attachItemsListEvents() {
    var container = document.getElementById("items-list");
    if (!container) return;

    container.addEventListener("input", function (e) {
      var t = e.target;
      if (t.matches("input[data-field]")) {
        updateItemField(t.getAttribute("data-item-id"), t.getAttribute("data-field"), t.value);
      }
    });

    container.addEventListener("change", function (e) {
      var t = e.target;
      if (t.matches("input[data-icon-upload]") && t.files && t.files[0]) {
        var iconId = t.getAttribute("data-icon-upload");
        openCropModal(t.files[0], 1, function (blob) { handleIconUpload(iconId, blob); });
      }
      if (t.matches("input[data-song-upload]") && t.files && t.files[0]) {
        handleSongFileUpload(t.getAttribute("data-song-upload"), t.files[0]);
      }
    });

    container.addEventListener("click", function (e) {
      var moveSectionBtn = e.target.closest("[data-move-section]");
      if (moveSectionBtn) {
        var secParts = moveSectionBtn.getAttribute("data-move-section").split(":");
        return moveSection(secParts[0], parseInt(secParts[1], 10));
      }

      var removeBtn = e.target.closest("[data-remove]");
      if (removeBtn) { playTrashSound(); return removeItem(removeBtn.getAttribute("data-remove")); }

      var topBtn = e.target.closest("[data-top]");
      if (topBtn) return moveToTop(topBtn.getAttribute("data-top"));

      var moveBtn = e.target.closest("[data-move]");
      if (moveBtn) {
        var parts = moveBtn.getAttribute("data-move").split(":");
        return moveItem(parts[0], parseInt(parts[1], 10));
      }

      var copyBtn = e.target.closest("[data-copy]");
      if (copyBtn) {
        var id = copyBtn.getAttribute("data-copy");
        var item = draft.items.find(function (it) { return it.id === id; });
        if (item && item.url) {
          navigator.clipboard.writeText(item.url).catch(function () {});
          copyBtn.textContent = "✓";
          setTimeout(function () { copyBtn.textContent = "⧉"; }, 1200);
        }
      }
    });
  }

  function attachCreatePageEvents() {
    attachCropModalEvents();

    var coverInput = document.getElementById("cover-upload-input");
    if (coverInput) {
      coverInput.addEventListener("change", function () {

    var usernameInput = document.getElementById("username-input");
    if (usernameInput) {

        draft.username = usernameInput.value.trim();
        validateUsername();
      });
    }
    var nameInput = document.getElementById("displayname-input");
    if (nameInput) {
      nameInput.addEventListener("input", function () {
        draft.displayName = nameInput.value;
      });
    }
    var bioInput = document.getElementById("bio-input");
    if (bioInput) {
      bioInput.addEventListener("input", function () {
        draft.bio = bioInput.value;
      });
    }

    var openPicker = document.getElementById("open-type-picker");
    var picker = document.getElementById("type-picker");
    var closePicker = document.getElementById("close-type-picker");
    if (openPicker && picker) openPicker.addEventListener("click", function () { picker.classList.add("open"); });
    if (closePicker && picker) closePicker.addEventListener("click", function () { picker.classList.remove("open"); });
    if (picker) {
      picker.addEventListener("click", function (e) {
        if (e.target === picker) picker.classList.remove("open");
        var opt = e.target.closest("[data-type]");
        if (opt) {
          var type = opt.getAttribute("data-type");
          picker.classList.remove("open");
          if (type === "social") {
            var socialPicker = document.getElementById("social-picker");
            if (socialPicker) socialPicker.classList.add("open");
          } else {
            addItem(type);
          }
        }
      });
    }

    var socialPicker = document.getElementById("social-picker");
    var closeSocialPicker = document.getElementById("close-social-picker");
    if (closeSocialPicker && socialPicker) closeSocialPicker.addEventListener("click", function () { socialPicker.classList.remove("open"); });
    if (socialPicker) {
      socialPicker.addEventListener("click", function (e) {
        if (e.target === socialPicker) socialPicker.classList.remove("open");
        var platBtn = e.target.closest("[data-platform]");
        if (platBtn) {
          addSocialItem(platBtn.getAttribute("data-platform"));
          socialPicker.classList.remove("open");
        }
      });
    }

    var publishBtn = document.getElementById("publish-btn");
    if (publishBtn) publishBtn.addEventListener("click", publishBio);

    attachItemsListEvents();
    renderItemsList();
  }

      if (openColor && colorModal) openColor.addEventListener("click", function () { colorModal.classList.add("open"); });
      if (closeColor && colorModal) closeColor.addEventListener("click", function () { colorModal.classList.remove("open"); });
      if (colorModal) {
        colorModal.addEventListener("click", function (e) {
          if (e.target === colorModal) colorModal.classList.remove("open");
          var swatch = e.target.closest("[data-color]");
          if (swatch) saveProfileColor(username, swatch.getAttribute("data-color"));
        });
      }
      var customColor = document.getElementById("custom-color-input");
      if (customColor) customColor.addEventListener("change", function () { saveProfileColor(username, customColor.value); });
    }

    // ---- share / QR popup ----
    var openShare = document.getElementById("open-share-popup");
    var shareModal = document.getElementById("share-modal");
    var closeShare = document.getElementById("close-share-modal");
    if (openShare && shareModal) {
      openShare.addEventListener("click", function () { shareModal.classList.add("open"); });
    }
    if (closeShare && shareModal) closeShare.addEventListener("click", function () { shareModal.classList.remove("open"); });
    if (shareModal) {
      shareModal.addEventListener("click", function (e) { if (e.target === shareModal) shareModal.classList.remove("open"); });
    }

    var copyBtn = document.getElementById("copy-link-btn");
    if (copyBtn) {
      copyBtn.addEventListener("click", function () {
        navigator.clipboard.writeText(profileUrl).catch(function () {});
        copyBtn.textContent = "Copied!";
        setTimeout(function () { copyBtn.textContent = "Copy link"; }, 1500);
      });
    }

    var downloadBtn = document.getElementById("download-share-btn");
    if (downloadBtn) {
      downloadBtn.addEventListener("click", function () {
        downloadBtn.disabled = true;
        var originalText = downloadBtn.textContent;
        downloadBtn.textContent = "Preparing…";
        var qrImgUrl = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(profileUrl);
        var isDark = accent === "#000000";
        var bodyBg = isDark ? "#0e0e12" : "#ffffff";
        var textColor = isDark ? "#ffffff" : "#14141a";
        var subColor = isDark ? "#9a9aa5" : "#6b6b76";

        loadImageForCanvas(data.cover, function (coverImg) {
          loadImageForCanvas(data.avatar, function (avatarImg) {
            loadImageForCanvas(qrImgUrl, function (qrImg) {
              var out = document.createElement("canvas");
              out.width = 480;
              out.height = 640;
              var ctx = out.getContext("2d");
              var bannerH = 220;

              // banner: real cover photo (cropped to fill) or a flat accent fallback
              if (coverImg) {
                var scale = Math.max(out.width / coverImg.width, bannerH / coverImg.height);
                var sw = out.width / scale, sh = bannerH / scale;
                var sx = (coverImg.width - sw) / 2, sy = (coverImg.height - sh) / 2;
                ctx.drawImage(coverImg, sx, sy, sw, sh, 0, 0, out.width, bannerH);
              } else {
                ctx.fillStyle = accent;
                ctx.fillRect(0, 0, out.width, bannerH);
              }
              // same dark gradient overlay as the live preview
              var grad = ctx.createLinearGradient(0, 0, 0, bannerH);
              grad.addColorStop(0, "rgba(0,0,0,0.1)");
              grad.addColorStop(1, "rgba(0,0,0,0.6)");
              ctx.fillStyle = grad;
              ctx.fillRect(0, 0, out.width, bannerH);

              // rest of the card
              ctx.fillStyle = bodyBg;
              ctx.fillRect(0, bannerH, out.width, out.height - bannerH);

              // avatar, overlapping the banner/body boundary like the live preview
              var cx = out.width / 2, cy = bannerH, r = 68;
              ctx.save();
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.closePath();
              ctx.clip();
              if (avatarImg) {
                ctx.drawImage(avatarImg, cx - r, cy - r, r * 2, r * 2);
              } else {
                ctx.fillStyle = "rgba(150,150,150,0.3)";
                ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
              }
              ctx.restore();
              ctx.strokeStyle = "#c9c9d1";
              ctx.lineWidth = 6;
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.stroke();

              ctx.fillStyle = textColor;
              ctx.font = "bold 26px sans-serif";
              ctx.textAlign = "center";
              ctx.fillText(data.displayName || username, out.width / 2, bannerH + 60);

              var qrBoxSize = 210;
              var qrBoxX = (out.width - qrBoxSize) / 2;
              var qrBoxY = bannerH + 90;
              ctx.fillStyle = "#ffffff";
              ctx.beginPath();
              if (ctx.roundRect) ctx.roundRect(qrBoxX, qrBoxY, qrBoxSize, qrBoxSize, 16);
              else ctx.rect(qrBoxX, qrBoxY, qrBoxSize, qrBoxSize);
              ctx.fill();
              ctx.strokeStyle = "#c9c9d1";
              ctx.lineWidth = 1;
              ctx.stroke();
              if (qrImg) {
                var pad = 14;
                ctx.drawImage(qrImg, qrBoxX + pad, qrBoxY + pad, qrBoxSize - pad * 2, qrBoxSize - pad * 2);
              }

              ctx.fillStyle = subColor;
              ctx.font = "15px monospace";
              ctx.fillText("mybio.zone.id/@" + username, out.width / 2, qrBoxY + qrBoxSize + 36);

              downloadBtn.disabled = false;
              downloadBtn.textContent = originalText;

              out.toBlob(function (blob) {
                if (!blob) { alert("Couldn't generate the image — the uploaded photo host may be blocking downloads."); return; }
                var a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "mybio-" + username + ".png";
                document.body.appendChild(a);
                a.click();
                a.remove();
              });
            });
          });
        });
      });
    }
  }

  function renderProfileRoute(app, path) {
    var username = decodeURIComponent(path.slice(2)); // strip leading "/@"
    app.innerHTML = profileLoadingHtml(username);
    attachCommonListeners();

    db.collection("bios").doc(username).get().then(function (doc) {
      if (window.location.pathname !== path) return; // navigated away while loading
      if (!doc.exists) {
        app.innerHTML = profileNotFoundHtml(username);
        attachCommonListeners();
        return;
      }
      var data = doc.data();
      if (data.banned) {
        app.innerHTML = profileBannedHtml(username);
        attachCommonListeners();
        return;
      }
      var isOwner = !!currentUser && currentUser.uid === data.uid;
      app.innerHTML = profileContentHtml(username, data, isOwner);
      attachCommonListeners();
      attachProfilePageEvents(username, data, isOwner);
    }).catch(function (err) {
      console.error(err);
      alert("Load failed: " + (err && err.message ? err.message : err) + (err && err.code ? " (" + err.code + ")" : ""));
      app.innerHTML = profileNotFoundHtml(username);
      attachCommonListeners();
    });
  }

  function searchPage() {
    return (
      '<div class="page create">' +
        '<header class="topbar create-topbar">' +
          '<a href="/" class="icon-btn" data-link aria-label="Back">←</a>' +
          '<span class="create-title">Search bios</span>' +
          '<span style="width:40px;"></span>' +
        '</header>' +
        '<div class="create-body">' +
          '<div class="username-field">' +
            '<span class="at-sign">@</span>' +
            '<input type="text" id="search-input" placeholder="username or name" />' +
          '</div>' +
          '<button type="button" class="pill pill-solid" id="search-btn" style="margin-top:12px;">Search</button>' +
          '<div id="search-results" style="margin-top:20px;"></div>' +
        '</div>' +
      '</div>'
    );
  }

  function attachSearchPageEvents() {
    var btn = document.getElementById("search-btn");
    var input = document.getElementById("search-input");
    var results = document.getElementById("search-results");
    if (!btn || !input || !results) return;

    var lastMatches = [];
    var lastShown = 0;
    var PAGE_SIZE = 10;

    function resultRowHtml(d) {
      return (
        '<a class="profile-item profile-item-link" href="/@' + escapeHtml(d.username) + '" data-link>' +
          (d.avatar ? '<img src="' + d.avatar + '" class="profile-item-icon" alt="" />' : '<div class="profile-item-icon profile-item-icon-placeholder"></div>') +
          '<span class="profile-item-body">' +
            '<span class="profile-item-label">' + escapeHtml(d.displayName || d.username) + (d.verified ? " " + verifiedBadgeSvg(d.verified, 13) : "") + '</span>' +
            '<span class="profile-item-url">@' + escapeHtml(d.username) + '</span>' +
          '</span>' +
        '</a>'
      );
    }

    function searchAgainBtnHtml() {
      return '<button type="button" class="pill pill-ghost search-again-btn" id="search-again-btn">' + SEARCH_ICON + ' Search again</button>';
    }

    function playFadeIn() {
      results.classList.remove("search-results-fade");
      void results.offsetWidth; // restart the animation each time
      results.classList.add("search-results-fade");
    }

    // "Search again" pages through the already-fetched match list — new
    // slice of results each tap, not a reset back to a blank search box.
    function showNextBatch() {
      var batch = lastMatches.slice(lastShown, lastShown + PAGE_SIZE);
      lastShown += batch.length;
      if (!lastMatches.length) {
        results.innerHTML = '<p class="empty-hint">No matches.</p>';
        return;
      }
      var moreLeft = lastShown < lastMatches.length;
      results.innerHTML = batch.map(resultRowHtml).join("") + (moreLeft ? searchAgainBtnHtml() : "");
      playFadeIn();
      var again = document.getElementById("search-again-btn");
      if (again) again.addEventListener("click", showNextBatch);
    }

    function doSearch() {
      var qRaw = (input.value || "").trim();
      if (!qRaw) return;
      var q = qRaw.toLowerCase();
      results.innerHTML = '<p class="empty-hint">Searching…</p>';

      // Firestore can't do "contains anywhere" search on its own, so this
      // pulls a bounded batch of bios and filters client-side. Fine at
      // small/medium scale — swap for a real search index (e.g. Algolia)
      // once there are enough bios that this feels slow.
      db.collection("bios").limit(300).get().then(function (snap) {
        var matches = [];
        snap.forEach(function (doc) {
          var d = doc.data();
          if (d.banned) return;
          var uname = (d.username || "").toLowerCase();
          var dname = (d.displayName || "").toLowerCase();
          if (uname.indexOf(q) !== -1 || dname.indexOf(q) !== -1) matches.push(d);
        });

        // Verified accounts first (that's the whole point of the badge being
        // a privilege), then prefix matches, then everything else.
        matches.sort(function (a, b) {
          var aV = a.verified ? 0 : 1;
          var bV = b.verified ? 0 : 1;
          if (aV !== bV) return aV - bV;
          var au = (a.username || "").toLowerCase();
          var bu = (b.username || "").toLowerCase();
          var aRank = au.indexOf(q) === 0 ? 0 : 1;
          var bRank = bu.indexOf(q) === 0 ? 0 : 1;
          return aRank - bRank;
        });

        lastMatches = matches;
        lastShown = 0;

        if (!matches.length) {
          results.innerHTML = '<p class="empty-hint">No matches for "' + escapeHtml(qRaw) + '".</p>';
          playFadeIn();
          return;
        }
        showNextBatch();
      }).catch(function (err) {
        console.error(err);
        alert("Search failed: " + (err && err.message ? err.message : err) + (err && err.code ? " (" + err.code + ")" : ""));
        results.innerHTML = '<p class="empty-hint">Something went wrong.</p>';
      });
    }

    btn.addEventListener("click", doSearch);
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") doSearch(); });
  }

  function signInRequiredHtml() {
    return (
      '<div class="page create">' +
        '<header class="topbar create-topbar">' +
          '<a href="/" class="icon-btn" data-link aria-label="Back">←</a>' +
          '<span class="create-title">Create your bio</span>' +
          '<span style="width:40px;"></span>' +
        '</header>' +
        '<div class="create-body" style="text-align:center;padding-top:60px;">' +
          '<p class="empty-hint">Sign in with Google on the home page first.</p>' +
          '<a href="/" class="pill pill-solid" data-link style="margin-top:16px;display:inline-flex;">← Back home</a>' +
        '</div>' +
      '</div>'
    );
  }

  function profileItemHtml(item) {
    var icon = item.icon
      ? renderIconHtml(item, "profile-item-icon")
      : '<div class="profile-item-icon profile-item-icon-placeholder"></div>';

    var urlLine = item.url ? '<span class="profile-item-url">' + escapeHtml(item.url) + '</span>' : "";

    if (item.type === "song") {
      return (
        '<div class="profile-item">' +
          icon +
          '<div class="profile-item-body">' +
            '<span class="profile-item-label">' + escapeHtml(item.label || "Untitled") + '</span>' +
            (item.url ? '<audio controls src="' + item.url + '" class="item-audio"></audio>' : '<span class="profile-item-empty">No source yet</span>') +
          '</div>' +
        '</div>'
      );
    }

    if (item.type === "link") {
      return (
        '<div class="profile-item">' +
          '<a class="profile-item-link-inner" href="' + escapeHtml(item.url || "#") + '" target="_blank" rel="noreferrer">' +
            icon +
            '<span class="profile-item-body">' +
              '<span class="profile-item-label">' + escapeHtml(item.label || "Untitled") + '</span>' +
              urlLine +
            '</span>' +
          '</a>' +
          '<button type="button" class="icon-btn small" data-copy-static="' + escapeHtml(item.url || "") + '" aria-label="Copy">⧉</button>' +
        '</div>'
      );
    }

    var href = item.type === "social" ? resolveSocialHref(item) : (item.url || "#");

    return (
      '<a class="profile-item profile-item-link" href="' + escapeHtml(href) + '" target="_blank" rel="noreferrer">' +
        icon +
        '<span class="profile-item-body">' +
          '<span class="profile-item-label">' + escapeHtml(item.label || "Untitled") + '</span>' +
          urlLine +
        '</span>' +
      '</a>'
    );
  }

  function stubPage(label) {
    return (
      '<div class="page stub">' +
        '<a href="/" class="pill pill-ghost stub-back" data-link>← Back home</a>' +
        '<h2>' + label + '</h2>' +
        '<p>This page isn&#39;t wired up yet — build it next.</p>' +
      '</div>'
    );
  }

  function routeToHtml(path) {
    if (path === "/") return homePage();
    if (path === "/search") return searchPage();
    return stubPage("Not found");
  }

  function attachCommonListeners() {
    var toggleBtn = document.getElementById("theme-toggle");
    if (toggleBtn) toggleBtn.addEventListener("click", toggleTheme);
    var logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", logout);
    var userChip = document.getElementById("user-chip");
    if (userChip) {
      userChip.addEventListener("click", function (e) {
        if (e.target.closest("#logout-btn")) return; // let the click through to logout
        userChip.classList.toggle("open");
      });
    }
    var signinBtn = document.getElementById("google-signin-btn");
    if (signinBtn) signinBtn.addEventListener("click", signInWithGoogle);
    attachLampEvents();
    attachAdminPanelEvents();
    attachSearchPageEvents();
  }

  function renderCreateRoute(app) {
    if (!currentUser) {
      app.innerHTML = signInRequiredHtml();
      attachCommonListeners();
      return;
    }
    if (!draftLoaded) {
      app.innerHTML = profileLoadingHtml("create");
      loadMyDraft(function () { render(); });
      return;
    }
    app.innerHTML = createPage();
    attachCreatePageEvents();
    attachCommonListeners();
  }

  // ---------- render ----------
  function render() {
    var app = document.getElementById("app");
    var path = window.location.pathname;

    if (path === "/create") { renderCreateRoute(app); return; }
    if (path.indexOf("/@") === 0) { renderProfileRoute(app, path); return; }

    app.innerHTML = routeToHtml(path);
    attachCommonListeners();
  }

  document.addEventListener("click", function (e) {
    var chip = document.getElementById("user-chip");
    if (chip && !chip.contains(e.target)) chip.classList.remove("open");
  });

  document.addEventListener("click", function (e) {
    var copyBtn = e.target.closest("[data-copy-static]");
    if (copyBtn) {
      var val = copyBtn.getAttribute("data-copy-static");
      if (val) {
        navigator.clipboard.writeText(val).catch(function () {});
        var old = copyBtn.textContent;
        copyBtn.textContent = "✓";
        setTimeout(function () { copyBtn.textContent = old; }, 1200);
      }
    }
  });

  document.addEventListener("click", function (e) {
    var link = e.target.closest("[data-link]");
    if (link) {
      e.preventDefault();
      navigate(link.getAttribute("href"));
    }
  });

  render();
  scheduleFlicker();
  bumpVisitorCount();
})();
</script>
</body>
</html>
